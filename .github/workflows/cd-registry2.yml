name: CD Francisco Javier Melero Lopez CursoCep

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  delivery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mostrar versión de Docker
        run: docker -v

      - name: Mostrar fecha de ejecución
        run: date

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: ./hangman-api
          push: true
          tags: ghcr.io/${{ github.actor }}/hangman-api:latest
