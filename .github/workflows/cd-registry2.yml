name: CD Francisco Javier Melero Lopez CursoCep

on:
  workflow_dispatch:

jobs:
  delivery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Docker version
        run: docker -v

      - name: Mostrar la hora de ejecución para la practica
        run: date

      # Login a GHCR (GitHub Container Registry)
      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker build
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./hangman-api
          push: true
          tags: ghcr.io/${{ github.actor }}/hangman-api:latest
